name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/cryptohub

jobs:
  # ── Build & push Docker images ─────────────────────────────────────────────
  build-go:
    name: Build Go image – ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - trading-engine
          - ws-gateway
          - order-service
          - risk-service
          - auth-service
          - exchange-proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/go.Dockerfile
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  build-python:
    name: Build Python image – ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - trend-engine
          - data-collector
          - backtest-engine
          - sentiment-analyzer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/python.Dockerfile
          build-args: SERVICE_PATH=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Deploy to environment ──────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    needs: [build-go, build-python, build-frontend]
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig.yaml
          echo "KUBECONFIG=$(pwd)/kubeconfig.yaml" >> "$GITHUB_ENV"

      - name: Update image tags
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          ENV="${{ github.event.inputs.environment || 'staging' }}"

          for svc in api-gateway trading-engine ws-gateway order-service risk-service auth-service exchange-proxy; do
            kubectl set image deployment/$svc \
              $svc=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/$svc:sha-$SHORT_SHA \
              -n cryptohub-$ENV
          done

          for svc in trend-engine data-collector backtest-engine sentiment-analyzer; do
            kubectl set image deployment/$svc \
              $svc=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/$svc:sha-$SHORT_SHA \
              -n cryptohub-$ENV
          done

          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:sha-$SHORT_SHA \
            -n cryptohub-$ENV

      - name: Wait for rollout
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          for svc in api-gateway trading-engine ws-gateway order-service risk-service auth-service exchange-proxy frontend; do
            kubectl rollout status deployment/$svc -n cryptohub-$ENV --timeout=300s
          done

      - name: Smoke test
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          if [ "$ENV" = "staging" ]; then
            URL="${{ secrets.STAGING_URL }}"
          else
            URL="${{ secrets.PRODUCTION_URL }}"
          fi
          curl -sf "$URL/api/health" || exit 1
          echo "✅ Smoke test passed"
