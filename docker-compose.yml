version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptohub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-cryptohub}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptohub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── InfluxDB ──
  influxdb:
    image: influxdb:2.7-alpine
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USER:-cryptohub}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-changeme123}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-cryptohub}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-market_data}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-cryptohub-influx-token}
    ports:
      - "8086:8086"
    volumes:
      - influx_data:/var/lib/influxdb2

  # ── Kafka (KRaft mode) ──
  kafka:
    image: apache/kafka:3.9.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: cjTMDewySXyt5dHiMcodVw
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  # ── Analysis Service (Python / FastAPI) ──
  analysis:
    build:
      context: ./backend/analysis
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cryptohub}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-cryptohub}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN:-cryptohub-influx-token}
      INFLUX_ORG: ${INFLUX_ORG:-cryptohub}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-market_data}
      KAFKA_BOOTSTRAP: kafka:9092
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_started
      kafka:
        condition: service_started

  # ── Trading Service (Go / Gin) ──
  trading:
    build:
      context: ./backend/trading
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cryptohub}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-cryptohub}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      KAFKA_BOOTSTRAP: kafka:9092
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  # ── Frontend (React / Vite) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - analysis
      - trading

volumes:
  pg_data:
  redis_data:
  influx_data:
  kafka_data:
