version: "3.9"

services:
  # ── Databases ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cryptohub_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cryptohub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cryptohub_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    container_name: cryptohub_influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: password123
      DOCKER_INFLUXDB_INIT_ORG: cryptohub
      DOCKER_INFLUXDB_INIT_BUCKET: market_data
      DOCKER_INFLUXDB_INIT_RETENTION: 0
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  # ── Message Queue ─────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: cryptohub_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: cryptohub_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # ── Backend: Go core trading engine ─────────────────────────────────────────
  go-core:
    build:
      context: ./backend/go-core
      dockerfile: Dockerfile
    container_name: cryptohub_go_core
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      GIN_MODE: release
      DATABASE_DSN: "host=postgres user=postgres password=postgres dbname=cryptohub port=5432 sslmode=disable"
      REDIS_ADDR: redis:6379
      JWT_SECRET: "change-me-in-production"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Backend: Python analysis service ─────────────────────────────────────────
  python-analysis:
    build:
      context: ./backend/python-analysis
      dockerfile: Dockerfile
    container_name: cryptohub_python_analysis
    ports:
      - "8001:8001"
    environment:
      DATABASE_DSN: "postgresql://postgres:postgres@postgres:5432/cryptohub"
      REDIS_URL: redis://redis:6379/0
      INFLUXDB_URL: http://influxdb:8086
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (production build served by Nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cryptohub_frontend
    ports:
      - "3000:80"
    depends_on:
      - go-core
      - python-analysis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  influxdb_data:
  zookeeper_data:
  kafka_data:
