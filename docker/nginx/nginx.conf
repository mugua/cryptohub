# ── Upstream – Go microservices ───────────────────────────────────────────────
upstream api_gateway {
    server api-gateway:8080;
    keepalive 32;
}

upstream ws_gateway {
    server ws-gateway:8082;
    keepalive 32;
}

upstream trend_engine {
    server trend-engine:8000;
    keepalive 16;
}

upstream backtest_engine {
    server backtest-engine:8000;
    keepalive 8;
}

upstream sentiment_analyzer {
    server sentiment-analyzer:8000;
    keepalive 8;
}

# ── Compression ───────────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    application/xml
    image/svg+xml;

# ── Server ────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-Frame-Options           "SAMEORIGIN"        always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Static frontend ──────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Immutable hashed assets (JS/CSS bundles produced by Vite)
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── REST API proxy ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         16 8k;
    }

    # ── WebSocket proxy ──────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://ws_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;

        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
    }

    # ── Python AI services ───────────────────────────────────────────────────
    location /api/analysis/ {
        proxy_pass         http://trend_engine;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";

        proxy_read_timeout 120s;
    }

    location /api/backtest/ {
        proxy_pass         http://backtest_engine;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";

        proxy_read_timeout 300s;
    }

    location /api/sentiment/ {
        proxy_pass         http://sentiment_analyzer;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Connection      "";

        proxy_read_timeout 60s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Hide nginx version ───────────────────────────────────────────────────
    server_tokens off;
}
