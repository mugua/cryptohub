worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream frontend    { server frontend:80; }
    upstream analysis_api { server analysis:8000; }
    upstream trading_api  { server trading:8001; }

    server {
        listen 80;
        server_name _;

        # Frontend SPA
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Analysis API
        location /api/v1/analysis/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://analysis_api/api/v1/analysis/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/auth/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://analysis_api/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/dashboard/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://analysis_api/api/v1/dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/settings/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://analysis_api/api/v1/settings/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Trading API
        location /api/v1/trading/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://trading_api/api/v1/trading/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://trading_api/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }
}
