server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS resolver for runtime service discovery
    resolver 127.0.0.11 valid=30s;

    # ── Analysis Service API (auth, dashboard, analysis, settings) ──
    location /api/v1/auth/ {
        set $upstream_analysis http://analysis:8000;
        proxy_pass $upstream_analysis$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/analysis/ {
        set $upstream_analysis http://analysis:8000;
        proxy_pass $upstream_analysis$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/dashboard/ {
        set $upstream_analysis http://analysis:8000;
        proxy_pass $upstream_analysis$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/settings/ {
        set $upstream_analysis http://analysis:8000;
        proxy_pass $upstream_analysis$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Trading Service API (strips /trading prefix) ──
    location ~ ^/api/v1/trading/(.*)$ {
        set $upstream_trading http://trading:8001;
        proxy_pass $upstream_trading/api/v1/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── WebSocket ──
    location /ws {
        set $upstream_trading http://trading:8001;
        proxy_pass $upstream_trading$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # ── Frontend SPA ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
